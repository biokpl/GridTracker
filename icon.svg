<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0e1d38"/>
      <stop offset="100%" stop-color="#050b17"/>
    </radialGradient>
    <radialGradient id="shine" cx="75%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>

    <!-- G gradient: purple-top → blue-mid → cyan-bottom -->
    <linearGradient id="g-grad" x1="413" y1="51" x2="300" y2="461" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a78bfa"/>
      <stop offset="45%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Cell gradients -->
    <linearGradient id="cell-lo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="cell-mid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cell-hi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="trend" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="55%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>

    <!-- Neon G filter: wide outer glow + tight inner glow + sharp -->
    <filter id="neon-g" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="wide"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="tight"/>
      <feMerge>
        <feMergeNode in="wide"/>
        <feMergeNode in="tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="line-glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cell-glow">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hi-glow">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="url(#shine)"/>

  <!-- ── Neon G ── -->
  <!-- Outer ambient halo -->
  <path d="M 413,124 A 205,205 0 1 0 461,256 L 300,256 L 300,330"
    stroke="#6366f1" stroke-width="90" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.055"/>
  <!-- Neon G — gradient stroke + glow filter -->
  <path d="M 413,124 A 205,205 0 1 0 461,256 L 300,256 L 300,330"
    stroke="url(#g-grad)" stroke-width="34" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.30" filter="url(#neon-g)"/>

  <!-- ── Dim grid cells (non-diagonal) ── -->
  <g fill="#081528" stroke="#162844" stroke-width="1.5">
    <rect x="92"  y="92"  width="100" height="100" rx="14"/>
    <rect x="206" y="92"  width="100" height="100" rx="14"/>
    <rect x="92"  y="206" width="100" height="100" rx="14"/>
    <rect x="320" y="206" width="100" height="100" rx="14"/>
    <rect x="206" y="320" width="100" height="100" rx="14"/>
    <rect x="320" y="320" width="100" height="100" rx="14"/>
  </g>

  <!-- ── Trend line ── -->
  <polyline points="142,370 256,256 370,142"
    stroke="#10b981" stroke-width="30" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    opacity="0.10"/>
  <polyline points="142,370 256,256 370,142"
    stroke="url(#trend)" stroke-width="10" fill="none"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#line-glow)"/>

  <!-- ── Highlighted cells ── -->
  <!-- Bottom-left -->
  <rect x="92" y="320" width="100" height="100" rx="14"
    fill="url(#cell-lo)" filter="url(#cell-glow)" opacity="0.88"/>
  <rect x="92" y="320" width="100" height="100" rx="14"
    fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>

  <!-- Center -->
  <rect x="206" y="206" width="100" height="100" rx="14"
    fill="url(#cell-mid)" filter="url(#cell-glow)"/>
  <rect x="206" y="206" width="100" height="100" rx="14"
    fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.5"/>

  <!-- Top-right (brightest) -->
  <rect x="320" y="92" width="100" height="100" rx="14"
    fill="url(#cell-hi)" filter="url(#hi-glow)"/>
  <rect x="320" y="92" width="100" height="100" rx="14"
    fill="none" stroke="#bfdbfe" stroke-width="2" opacity="0.6"/>

  <!-- ── Upward arrow ── -->
  <g filter="url(#line-glow)">
    <line x1="370" y1="82" x2="370" y2="56"
      stroke="#34d399" stroke-width="7" stroke-linecap="round"/>
    <polyline points="353,70 370,52 387,70"
      stroke="#34d399" stroke-width="7" fill="none"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ── Dot connectors ── -->
  <circle cx="142" cy="370" r="7" fill="#10b981"  opacity="0.9" filter="url(#line-glow)"/>
  <circle cx="256" cy="256" r="7" fill="#34d399"  filter="url(#line-glow)"/>
  <circle cx="370" cy="142" r="9" fill="#6ee7b7"  filter="url(#line-glow)"/>
</svg>
